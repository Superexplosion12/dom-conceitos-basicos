<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extensão - Programação para web</title>
</head>
<body>
  <h1>Atividade 3 - DOM Conceitos Básicos</h1>
  <button id="button1">Incrementar</button>
  <button id="button2">Descrementar</button>
  <br><br>
  <span id="contador"></span>

  <br><br>
  <input type="text" placeholder="Digite algo..."><br>
  <div id="texto">Pressione "Enter" para adicionar o texto à página</div>
  <br><br>
  <span id="caracteres"></span>

  <br><br>
  <div id="mensagens"></div>
  <br><br>

  <label for="tipoLista">Escolha o tipo de lista:</label>
  <select id="tipoLista">
    <option value="ul">Lista Não Ordenada</option>
    <option value="ol">Lista Ordenada</option>
  </select>
  <button id="btnAddLista">Adicionar Lista</button>
  <br><br>

  <div id="areaListas"></div>
  <br><br>

  <button id="reset">Resetar tudo</button>

  <script src="script.js"></script>
</body>
</html>
